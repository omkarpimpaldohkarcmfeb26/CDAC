
<!DOCTYPE html>
<html>
<head>
    <title>Contact Us Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f2f2f2;
        }
        .container {
            display: block;
            justify-content: space-between;
            padding: 40px;
        }
        .left, .right {
            width: 70%;
            background: #c3bfbf;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .radio-group {
            margin: 10px 0;
        }
        .radio-group label {
            margin-right: 15px;
        }
        button {
            background: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">

     <div class="right">
        <h2>Contact Form</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email ID" required>
            <input type="url" placeholder="Website">
            <input type="tel" placeholder="Contact Number">

            <!-- Dropdown -->
            <select>
                <option value="">Select Subject</option>
                <option value="general">General Query</option>
                <option value="admission">Admission</option>
                <option value="support">Support</option>
            </select>

            <!-- Radio Buttons -->
            <div class="radio-group">
                <label><input type="radio" name="contact" value="student"> Student</label>
                <label><input type="radio" name="contact" value="faculty"> Faculty</label>
                <label><input type="radio" name="contact" value="other"> Other</label>
            </div>

            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
    
    <div class="left">
        <h2>Get in Touch</h2>
        <p><b>Name:</b> PGDAC Institute</p>
        <p><b>Email:</b> info@pgdac.com</p>
        <p><b>Phone:</b> +91 9876543210</p>
        <p><b>Address:</b> Ghatanji, Maharashtra, India</p>
        <p><b>Follow us:</b> Facebook | Twitter | LinkedIn</p>
    </div>

    
   
</div>

</body>
</html>
